<app-navbar></app-navbar>

<div class="send-page">
  <div class="hero">
    <div class="hero-content">
      <i class="fa fa-paper-plane fa-2x"></i>
      <h1>Envoyer de l'argent</h1>
      <p>Transférez de l'argent à l'un de vos amis en quelques secondes</p>
    </div>
  </div>

  <div class="content">
    <div class="card">

      <div *ngIf="loadingContacts" class="state-block">
        <i class="fa fa-spinner fa-spin fa-2x"></i>
        <p>Chargement de vos contacts...</p>
      </div>

      <div *ngIf="!loadingContacts && errorMessage && contacts.length === 0" class="state-block error">
        <i class="fa fa-exclamation-triangle fa-2x"></i>
        <p>{{ errorMessage }}</p>
      </div>

      <div *ngIf="!loadingContacts && !errorMessage && contacts.length === 0" class="state-block">
        <i class="fa fa-user-plus fa-2x"></i>
        <p>Vous devez avoir au moins un ami pour envoyer de l'argent</p>
        <a routerLink="/add-friend" class="btn-primary-custom">
          <i class="fa fa-plus"></i> Ajouter un ami
        </a>
      </div>

      <form (ngSubmit)="onSubmit()" #sendForm="ngForm" *ngIf="!loadingContacts && contacts.length > 0">
        <p class="alert-success fade-in" *ngIf="successMessage">
          <i class="fa fa-check-circle"></i> {{ successMessage }}
        </p>
        <p class="alert-error fade-in" *ngIf="errorMessage">
          <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
        </p>

        <div class="form-group">
          <label><i class="fa fa-user"></i> Destinataire</label>
          <select class="form-control" name="recipientEmail" [(ngModel)]="recipientEmail" required>
            <option value="" disabled selected>-- Sélectionnez un ami --</option>
            <option *ngFor="let email of contacts" [value]="email">{{ email }}</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i class="fa fa-eur"></i> Montant</label>
            <div class="amount-input">
              <input
                type="number"
                name="amount"
                min="1"
                step="0.01"
                placeholder="0.00"
                [(ngModel)]="amount"
                required>
              <span class="currency">€</span>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fa fa-comment"></i> Description</label>
            <input
              type="text"
              class="form-control"
              name="description"
              placeholder="Facultatif"
              [(ngModel)]="description">
          </div>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="sendForm.invalid || sending">
          <span *ngIf="!sending"><i class="fa fa-paper-plane"></i> Envoyer l'argent</span>
          <span *ngIf="sending"><i class="fa fa-spinner fa-spin"></i> Envoi en cours...</span>
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/home" class="back-link"><i class="fa fa-arrow-left"></i> Retour à l'accueil</a>
      </div>
    </div>
  </div>
</div>
